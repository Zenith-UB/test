<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  padding: 20px;
  background: #111;
}

#container {
  --card-width: 1600px;
  --aspect: 16 / 6;

  width: min(var(--card-width), 100%);
  margin: 0 auto;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

#title {
  width: min(500px, 80%);
  height: auto;

  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}

#title:hover {
  transform: translateY(-6px) scale(1.08);
}

#imageWrap {
  position: relative;

  width: 100%;
  aspect-ratio: var(--aspect);

  border: 2px solid black;
  border-radius: 16px;
  overflow: hidden;

  box-shadow: 0 10px 30px rgba(0,0,0,0.5);

  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}

#imageWrap:hover {
  transform: scale(1.04);
}

#image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

#gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.9));
}
</style>
</head>
<body>

<div id="container">
  <img id="title" src="title.png">

  <div id="imageWrap">
    <img id="image" src="fnaf.png">
    <div id="gradient"></div>
  </div>
</div>

</body>
</html>
