<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
:root {
    --bg-color: #0f172a;
    --text-color: #e2e8f0;
    --border-color: #3b82f6;
    --card-bg: #1e293b;
    --card-hover: #60a5fa;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0f172a, #111827);
    color: var(--text-color);
    display: flex;
    flex-direction: column;
    align-items: center;
}

#page-header {
    width: 100%;
    max-width: 1200px;
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 20px;
    margin-bottom: 30px;
}

#title-mainimg-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

#page-title-img {
    width: 100%;
    max-width: 400px;
}

#main-big-img-container {
    width: 100%;
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    border-radius: 16px;
    padding: 12px;
}

#main-big-img {
    width: 100%;
    border-radius: 10px;
}

#text-sidebar {
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    border-radius: 16px;
    padding: 15px;
    text-align: center;
}

#episode-grid {
    width: 100%;
    max-width: 1200px;
}

.season-block {
    margin-bottom: 40px;
}

.season-header {
    font-size: 1.4rem;
    font-weight: bold;
    color: #93c5fd;
    margin: 10px 0;
}

.grid {
    display: grid;
    gap: 20px;
    padding: 15px;
    background: rgba(30,41,59,0.4);
    border: 2px solid var(--border-color);
    border-radius: 16px;
}

.grid-1 { grid-template-columns: 1fr; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }

.episode-item {
    display: flex;
    text-decoration: none;
    color: inherit;
    background: var(--card-bg);
    border-radius: 12px;
    padding: 10px;
    transition: transform 0.25s ease;
}

.episode-item:hover {
    transform: scale(1.05);
}

.episode-number {
    color: #60a5fa;
    font-size: 1.5rem;
    font-weight: bold;
    margin-right: 12px;
    min-width: 30px;
}

.episode-content {
    width: 100%;
    display: flex;
    flex-direction: column;
}

.episode-image {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    background: #334155;
    border-radius: 10px;
}

.episode-title {
    margin-top: 8px;
    text-align: center;
    color: #dbeafe;
    font-weight: 600;
}
</style>
</head>

<body>

<div id="page-header">

    <div id="title-mainimg-container">
        <img id="page-title-img"
        src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjgwIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjx0ZXh0IHg9IjIwMCIgeT0iNTAiIGZpbGw9IiNmZmYiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtc2l6ZT0iMzYiPllvdXIgVGl0bGU8L3RleHQ+PC9zdmc+"
        alt="title">

        <div id="main-big-img-container">
            <img id="main-big-img"
            src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAwIiBoZWlnaHQ9IjM2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iNjAwIiBoZWlnaHQ9IjM2MCIgZmlsbD0iIzMzNDE1NSIvPjx0ZXh0IHg9IjMwMCIgeT0iMTgwIiBmaWxsPSIjOTNjNWZkIj5IZXJvIEltYWdlPC90ZXh0Pjwvc3ZnPg=="
            alt="hero">
        </div>
    </div>

    <div id="text-sidebar">
        Test
    </div>

</div>

<div style="width:100%;max-width:1200px;height:4px;background:#3b82f6;margin:20px 0;border-radius:999px;"></div>

<div id="episode-grid"></div>

<script>
const container = document.getElementById("episode-grid");

function makeEpisode(ep) {
    const a = document.createElement("a");
    a.className = "episode-item";
    a.href = ep.linkUrl || "#";

    const num = document.createElement("div");
    num.className = "episode-number";
    num.textContent = ep.number;

    const content = document.createElement("div");
    content.className = "episode-content";

    const img = document.createElement("img");
    img.className = "episode-image";
    img.src = ep.imageUrl || "";
    img.alt = ep.title;

    const title = document.createElement("div");
    title.className = "episode-title";
    title.textContent = ep.title;

    content.appendChild(img);
    content.appendChild(title);
    a.appendChild(num);
    a.appendChild(content);

    return a;
}

function makeSeason(seasonObj) {
    const block = document.createElement("div");
    block.className = "season-block";

    const header = document.createElement("div");
    header.className = "season-header";
    header.textContent = `Season ${seasonObj.season}`;

    const grid = document.createElement("div");

    const count = seasonObj.episodes.length;

    grid.className =
        "grid " +
        (count === 1 ? "grid-1" :
         count === 2 ? "grid-2" :
         "grid-3");

    seasonObj.episodes.forEach(ep => {
        grid.appendChild(makeEpisode(ep));
    });

    block.appendChild(header);
    block.appendChild(grid);

    return block;
}

async function load() {
    try {
        const res = await fetch("./stuff.json");
        const data = await res.json();

        container.innerHTML = "";

        data.seasons.forEach(season => {
            container.appendChild(makeSeason(season));
        });

    } catch (e) {
        console.error(e);
        container.innerHTML = "<h2>Failed to load</h2>";
    }
}

load();
</script>

</body>
</html>
