<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  padding: 20px; 
  background: #111;
}

.container {
  position: relative;
  width: min(900px, 100%);
  margin: 0 auto; 
  border-radius: 12px;
  overflow: hidden;
}

#stuff img {
  width: 100%;
  height: auto;
  display: block;
  border: 5px solid black;
}

#gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent, black);
}

.content {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: white;
  z-index: 2;
}
</style>
</head>
<body>

<div class="container" id="stuff">
  <img src="fnaf.png" />
  <div id="gradient"></div>
  <div class="content">Fnaf</div>
</div>

</body>
</html>
