<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  padding: 20px;
  background: #111;
}

#container {
  --card-width: 1600px;  
  --aspect: 16 / 6;     

  position: relative;
  width: min(var(--card-width), 100%);
  aspect-ratio: var(--aspect);

  margin: 0 auto;
  border: 2px solid black;
  border-radius: 12px;
  overflow: hidden;
}

#image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

#gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent, black);
}

#content {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: white;
  z-index: 2;
}
</style>
</head>
<body>

<div id="container">
  <img id="image" src="fnaf.png">
  <div id="gradient"></div>
  <div id="content">Fnaf</div>
</div>

</body>
</html>
