<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  padding: 20px;
  background: #111;
}

#container {
  --card-width: 1600px;
  --aspect: 16 / 6;

  width: min(var(--card-width), 100%);
  margin: 0 auto;

  display: flex;
  flex-direction: column;
  gap: 10px;

  transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);

  transform-origin: center;
}

#title {
  width: min(500px, 80%);
  height: auto;

  margin-left: 10px;
}

#imageWrap {
  position: relative;

  border: 2px solid black;
  border-radius: 16px;
  overflow: hidden;

  aspect-ratio: var(--aspect);

  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

#image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

#gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.9));
}

#container:hover {
  transform: scale(1.03);
}
</style>
</head>
<body>

<div id="container">
  <img id="title" src="title.png">

  <div id="imageWrap">
    <img id="image" src="fnaf.png">
    <div id="gradient"></div>
  </div>
</div>

</body>
</html>
