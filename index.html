<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
:root {
    --bg-color: #0f172a;
    --text-color: #e2e8f0;
    --border-color: #3b82f6;
    --card-bg: #1e293b;
    --card-border: #2563eb;
    --card-hover: #60a5fa;
    --hover-anim-scale: 1.05;
    --hover-anim-duration: 0.3s;
    --hover-anim-easing: cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

* { box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
    color: var(--text-color);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* HEADER */
#page-header {
    width: 100%;
    max-width: 1200px;
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 20px;
}

#title-mainimg-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
}

#page-title-img {
    max-width: 400px;
    width: 100%;
}

#main-big-img-container {
    width: 100%;
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    border-radius: 16px;
    padding: 12px;
}

#main-big-img {
    width: 100%;
    display: block;
    border-radius: 10px;
}

#text-sidebar {
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
}

.page-divider {
    width: 100%;
    max-width: 1200px;
    height: 4px;
    background: linear-gradient(90deg, transparent, #3b82f6, transparent);
    margin: 30px 0;
    border-radius: 999px;
}

/* GRID */
#episode-grid-container {
    width: 100%;
    max-width: 1200px;
}

#season-label {
    color: #93c5fd;
    font-size: 1.3rem;
    font-weight: bold;
    margin-bottom: 20px;
}

#episode-grid {
    display: grid;
    gap: 20px;
    padding: 20px;
    background: rgba(30, 41, 59, 0.4);
    border: 2px solid var(--card-border);
    border-radius: 20px;
}

.grid-1x1 { grid-template-columns: 1fr; }
.grid-2xN { grid-template-columns: repeat(2, 1fr); }
.grid-3xN { grid-template-columns: repeat(3, 1fr); }

/* EPISODE CARD */
.episode-item {
    display: flex;
    text-decoration: none;
    color: inherit;
    background: var(--card-bg);
    border: 2px solid transparent;
    border-radius: 16px;
    padding: 12px;
    transition: transform 0.3s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}

.episode-item:hover {
    transform: scale(var(--hover-anim-scale));
    border-color: var(--card-hover);
    box-shadow: 0 0 25px rgba(59,130,246,.5);
}

.episode-number {
    color: #60a5fa;
    font-size: 1.6rem;
    font-weight: bold;
    margin-right: 12px;
    min-width: 30px;
}

.episode-content {
    width: 100%;
    display: flex;
    flex-direction: column;
}

.episode-image {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    background: #334155;
    border-radius: 10px;
}

.episode-title {
    margin-top: 10px;
    text-align: center;
    font-weight: 600;
    color: #dbeafe;
}

/* FOOTER */
#bottom-notes {
    width: 100%;
    max-width: 1200px;
    margin-top: 30px;
    padding: 20px;
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    border-radius: 16px;
}

.pagination-note {
    display: block;
    margin: 8px 0;
    color: #93c5fd;
    text-decoration: none;
}

.pagination-note:hover {
    color: white;
}

@media (max-width: 900px) {
    #page-header { grid-template-columns: 1fr; }
    .grid-3xN { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 600px) {
    .grid-3xN, .grid-2xN { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div id="page-header">
    <div id="title-mainimg-container">
        <img id="page-title-img" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjgwIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjx0ZXh0IHg9IjIwMCIgeT0iNTAiIGZpbGw9IiNmZmYiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtc2l6ZT0iMzYiPllvdXIgVGl0bGU8L3RleHQ+PC9zdmc+">

        <div id="main-big-img-container">
            <img id="main-big-img" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAwIiBoZWlnaHQ9IjM2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iNjAwIiBoZWlnaHQ9IjM2MCIgZmlsbD0iIzMzNDE1NSIvPjx0ZXh0IHg9IjMwMCIgeT0iMTgwIiBmaWxsPSIjOTNjNWZkIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj5IZXJvIEltYWdlPC90ZXh0Pjwvc3ZnPg==">
        </div>
    </div>

    <div id="text-sidebar">
        Season selector + description area
    </div>
</div>

<div class="page-divider"></div>

<div id="episode-grid-container">
    <div id="season-label">Season: <span id="season-number-display">1</span></div>
    <div id="episode-grid"></div>
</div>

<div id="bottom-notes">
    <a class="pagination-note">Pagination note</a>
    <a class="pagination-note">More pages per season</a>
</div>

<script>
const grid = document.getElementById("episode-grid");
const seasonDisplay = document.getElementById("season-number-display");

function renderEpisodeGrid(episodes) {
    const count = episodes.length;

    grid.className =
        count === 1 ? "grid-1x1" :
        count === 2 ? "grid-2xN" :
        "grid-3xN";

    grid.innerHTML = "";

    episodes.forEach(ep => {
        const a = document.createElement("a");
        a.className = "episode-item";
        a.href = ep.linkUrl || "#";

        const num = document.createElement("div");
        num.className = "episode-number";
        num.textContent = ep.number;

        const content = document.createElement("div");
        content.className = "episode-content";

        const img = document.createElement("img");
        img.className = "episode-image";
        img.src = ep.imageUrl || "";
        img.alt = ep.title;

        const title = document.createElement("div");
        title.className = "episode-title";
        title.textContent = ep.title;

        content.appendChild(img);
        content.appendChild(title);

        a.appendChild(num);
        a.appendChild(content);

        grid.appendChild(a);
    });
}

async function loadSeason() {
    try {
        const res = await fetch("stuff.json");
        const data = await res.json();

        const params = new URLSearchParams(location.search);
        const seasonNum = Number(params.get("season")) || 1;

        const season = data.seasons.find(s => s.season === seasonNum);

        if (!season) {
            grid.innerHTML = "<h2>Season not found</h2>";
            return;
        }

        seasonDisplay.textContent = season.season;
        renderEpisodeGrid(season.episodes);

    } catch (e) {
        console.error(e);
        grid.innerHTML = "<h2>Failed to load stuff.json</h2>";
    }
}

loadSeason();
</script>

</body>
</html>
