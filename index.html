<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  padding: 20px;
  background: #111;
}

#container {
  --card-width: 1600px;
  --aspect: 16 / 6;

  position: relative;
  width: min(var(--card-width), 100%);
  aspect-ratio: var(--aspect);

  margin: 0 auto;

  border: 2px solid black;
  border-radius: 16px;
  overflow: hidden;

  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

#image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;

  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

#title {
  position: absolute;
  top: 20px;
  left: 20px;

  width: min(500px, 80%);
  height: auto;

  z-index: 2;

  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

#gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.9));
}

#container:hover #image {
  transform: scale(1.07);
}

#container:hover #title {
  transform: scale(1.05);
}
  
</style>
</head>
<body>

<img id="title" src="title.png">

<div id="container">
  <img id="image" src="fnaf.png">
  <div id="gradient"></div>
</div>

</body>
</html>
