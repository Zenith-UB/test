<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  padding: 20px;
  background: #111;
}

#container {
  position: relative;
  width: min(1600px, 100%);
  margin: 0 auto;
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid black;
}

#movietvshowimage {
  width: 100%;
  height: 450px;
  object-fit: cover;
  display: block;
}

#gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent, black);
}

#content {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: white;
  z-index: 2;
}
</style>
</head>
<body>

<div id="container">
  <img id="movietvshowimage" src="fnaf.png">
  <div id="gradient"></div>
  <div id="content">Fnaf</div>
</div>

</body>
</html>
